<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blue Angel — Digital Comic</title>
  <style>
    :root {
      --bg: #05070b;
      --panel: rgba(8, 10, 16, 0.82);
      --line: rgba(55, 145, 255, 0.32);
      --text: #f4efe6;
      --muted: #9fb0c8;
      --blue: #1688ff;
      --gold: #b9853a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 80% 10%, rgba(18, 100, 255, 0.16), transparent 36%),
        radial-gradient(circle at 20% 90%, rgba(185, 133, 58, 0.10), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    body {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      min-height: 58px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.48));
      border-bottom: 1px solid var(--line);
      user-select: none;
      z-index: 5;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .brand strong {
      font-size: 18px;
      color: var(--text);
      font-weight: 600;
    }

    .brand span {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .2em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }

    button {
      border: 1px solid rgba(255,255,255,.18);
      background: var(--panel);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(22,136,255,.72);
      background: rgba(18, 35, 65, 0.88);
    }

    button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .counter {
      min-width: 92px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }

    main {
      position: relative;
      display: grid;
      place-items: center;
      padding: 14px;
      overflow: hidden;
    }

    .page-frame {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    img#comicPage {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 1px solid rgba(185, 133, 58, 0.34);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.9),
        0 18px 60px rgba(0,0,0,.58),
        0 0 42px rgba(22, 136, 255, .10);
      background: #000;
    }

    .page-title {
      position: absolute;
      left: 18px;
      bottom: 16px;
      padding: 7px 11px;
      border: 1px solid rgba(185, 133, 58, 0.35);
      background: rgba(0,0,0,.58);
      color: rgba(244, 239, 230, .82);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(6px);
    }

    footer {
      min-height: 42px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      font-size: 12px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: linear-gradient(0deg, rgba(0,0,0,.80), rgba(0,0,0,.36));
      border-top: 1px solid var(--line);
      user-select: none;
    }

    .progress {
      width: min(420px, 52vw);
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      overflow: hidden;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--gold));
      transition: width .18s ease;
    }

    .hint {
      opacity: .8;
    }

    @media (max-width: 720px) {
      header {
        padding: 8px 10px;
      }

      .brand strong {
        font-size: 14px;
      }

      .brand span {
        display: none;
      }

      .controls {
        gap: 6px;
      }

      button {
        padding: 8px 10px;
        font-size: 13px;
      }

      .counter {
        min-width: 70px;
        font-size: 12px;
      }

      main {
        padding: 8px;
      }

      footer {
        padding: 6px 10px;
        gap: 8px;
      }

      .hint {
        display: none;
      }

      .progress {
        width: 72vw;
      }

      .page-title {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <strong>Blue Angel</strong>
      <span>A Gemfire Comics Story</span>
    </div>

    <div class="controls" aria-label="Comic navigation">
      <button id="firstBtn" type="button" title="First page">First</button>
      <button id="prevBtn" type="button" title="Previous page">Prev</button>
      <div id="counter" class="counter">Page 1 / 13</div>
      <button id="nextBtn" type="button" title="Next page">Next</button>
      <button id="lastBtn" type="button" title="Last page">Last</button>
    </div>
  </header>

  <main>
    <div class="page-frame">
      <img id="comicPage" src="" alt="Blue Angel comic page" />
      <div id="pageTitle" class="page-title"></div>
    </div>
  </main>

  <footer>
    <span class="hint">Use ← / → keys or click the buttons.</span>
    <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
  </footer>

  <script>
    // These filenames match the GitHub root folder shown in your screenshot.
    // Keep index.html in the same folder as these image files.
    const pages = [
      { title: "Cover", file: "New cover.png" },
      { title: "Inside Title", file: "01_Inside_Title.png" },
      { title: "Page 1", file: "Page1_Polished.png" },
      { title: "Page 2", file: "Page2_Polished.png" },
      { title: "Page 3", file: "Page3_Polished.png" },
      { title: "Page 4", file: "Page4_Polished.png" },
      { title: "Page 5", file: "page5_Polished.png" },
      { title: "Page 6", file: "page6_Polished.png" },
      { title: "Page 7", file: "Page7_Polished.png" },
      { title: "Page 8", file: "Page8_Polished.png" },
      { title: "Page 9", file: "Page9_Polished.png" },
      { title: "Page 10", file: "Page10_Polished.png" },
      { title: "End Card", file: "12_End_Card.png" }
    ];

    let current = 0;

    const img = document.getElementById("comicPage");
    const counter = document.getElementById("counter");
    const pageTitle = document.getElementById("pageTitle");
    const progressBar = document.getElementById("progressBar");

    const firstBtn = document.getElementById("firstBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const lastBtn = document.getElementById("lastBtn");

    function updatePage() {
      const page = pages[current];
      img.src = encodeURI(page.file);
      img.alt = `Blue Angel — ${page.title}`;
      counter.textContent = `${page.title} (${current + 1} / ${pages.length})`;
      pageTitle.textContent = page.title;

      firstBtn.disabled = current === 0;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === pages.length - 1;
      lastBtn.disabled = current === pages.length - 1;

      const progress = ((current + 1) / pages.length) * 100;
      progressBar.style.width = `${progress}%`;
    }

    function goTo(index) {
      current = Math.max(0, Math.min(index, pages.length - 1));
      updatePage();
    }

    firstBtn.addEventListener("click", () => goTo(0));
    prevBtn.addEventListener("click", () => goTo(current - 1));
    nextBtn.addEventListener("click", () => goTo(current + 1));
    lastBtn.addEventListener("click", () => goTo(pages.length - 1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") goTo(current - 1);
      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        goTo(current + 1);
      }
      if (event.key === "Home") goTo(0);
      if (event.key === "End") goTo(pages.length - 1);
    });

    // Preload neighboring pages for smoother page turns.
    function preload() {
      pages.forEach((page) => {
        const image = new Image();
        image.src = encodeURI(page.file);
      });
    }

    updatePage();
    preload();
  </script>
</body>
</html>
